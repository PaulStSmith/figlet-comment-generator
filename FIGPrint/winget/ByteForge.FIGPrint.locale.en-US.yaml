ShortDescription: A command-line utility for rendering text using FIGlet fonts
Description: |-
  FIGPrint is a command-line application that renders text as ASCII art using FIGlet fonts.
  It supports multiple layout modes (Full Size, Kerning, Smushing) and can process text from
  command-line arguments or piped input. Perfect for creating eye-catching text banners for
  console applications, scripts, or just for fun.
