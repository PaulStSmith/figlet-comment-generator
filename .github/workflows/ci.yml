name: CI

on:
  push:
    branches: [Development]

jobs:
  # -------------------------------------------------------------------------
  # C# — build and run MSTest suite
  # -------------------------------------------------------------------------
  test-csharp:
    name: .NET Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FIGLet.Tests/FIGLet.Tests.csproj

      - name: Build
        run: dotnet build FIGLet.Tests/FIGLet.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test FIGLet.Tests/FIGLet.Tests.csproj --no-build --configuration Release --verbosity normal

  # -------------------------------------------------------------------------
  # Version sync — C# and TS library versions must match
  # -------------------------------------------------------------------------
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Check versions match
        run: |
          CS_VER=$(grep -oPm1 "(?<=<Version>)[^<]+" FIGLet/FIGLet.csproj)
          TS_VER=$(node -p "require('./FIGLet.TS/package.json').version")
          PY_VER=$(grep -oPm1 '(?<=^version = ")[^"]+' FIGLet.Python/pyproject.toml)
          echo "C#     version: $CS_VER"
          echo "TS     version: $TS_VER"
          echo "Python version: $PY_VER"
          if [ "$CS_VER" != "$TS_VER" ] || [ "$CS_VER" != "$PY_VER" ]; then
            echo "::error::Version mismatch — FIGLet.csproj ($CS_VER), FIGLet.TS/package.json ($TS_VER), and FIGLet.Python/pyproject.toml ($PY_VER) must all be the same."
            exit 1
          fi
          echo "Versions match: $CS_VER"

  # -------------------------------------------------------------------------
  # Python — install and run pytest suite
  # -------------------------------------------------------------------------
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: FIGLet.Python
        run: pip install pytest .

      - name: Test
        working-directory: FIGLet.Python
        run: pytest tests/ -v

  # -------------------------------------------------------------------------
  # TypeScript — build and run Vitest suite
  # -------------------------------------------------------------------------
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: FIGLet.TS/package-lock.json

      - name: Install dependencies
        working-directory: FIGLet.TS
        run: npm ci

      - name: Test
        working-directory: FIGLet.TS
        run: npm test
