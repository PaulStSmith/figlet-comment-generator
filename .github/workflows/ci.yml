name: CI

on:
  push:
    branches: [Development]
  pull_request:
    branches: [Development, master, main]

jobs:
  # -------------------------------------------------------------------------
  # C# — build and run MSTest suite
  # -------------------------------------------------------------------------
  test-csharp:
    name: .NET Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore FIGLet.Tests/FIGLet.Tests.csproj

      - name: Build
        run: dotnet build FIGLet.Tests/FIGLet.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test FIGLet.Tests/FIGLet.Tests.csproj --no-build --configuration Release --verbosity normal

  # -------------------------------------------------------------------------
  # TypeScript — build and run Vitest suite
  # -------------------------------------------------------------------------
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: FIGLet.TS/package-lock.json

      - name: Install dependencies
        working-directory: FIGLet.TS
        run: npm ci

      - name: Test
        working-directory: FIGLet.TS
        run: npm test
