name: Publish FIGPrint

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGPrint/**'
      - '.github/workflows/publish-figprint.yml'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest

    permissions:
      contents: write   # required to create GitHub releases and push tags

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Copy LICENSE
        run: cp LICENSE FIGPrint/LICENSE

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          # Read major.minor from csproj; use the Actions run number as patch.
          # Capped at 65534 to stay within the 0-65535 limit of System.Version components.
          [xml]$csproj = Get-Content FIGPrint/FIGPrint.csproj
          $base = ($csproj.Project.PropertyGroup.Version | Where-Object { $_ }) -replace '\.\d+$', ''
          $patch = [Math]::Min(${{ github.run_number }}, 65534)
          $newVersion = "$base.$patch"
          (Get-Content FIGPrint/FIGPrint.csproj -Raw) `
            -replace '<Version>[^<]*</Version>', "<Version>$newVersion</Version>" |
            Set-Content FIGPrint/FIGPrint.csproj -NoNewline
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "Version: $newVersion"

      - name: Check if tag exists
        id: check_tag
        shell: bash
        run: |
          TAG_NAME="figprint-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Build win-x64
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          dotnet publish FIGPrint/FIGPrint.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish/win-x64 `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Build win-arm64
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          dotnet publish FIGPrint/FIGPrint.csproj `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained true `
            --output ./publish/win-arm64 `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Create ZIP archives
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          # Clean up publish directories (keep only exe and fonts)
          Get-ChildItem ./publish/win-x64 -Exclude "FIGPrint.exe", "fonts" | Remove-Item -Recurse -Force
          Get-ChildItem ./publish/win-arm64 -Exclude "FIGPrint.exe", "fonts" | Remove-Item -Recurse -Force

          # Create ZIPs
          Compress-Archive -Path ./publish/win-x64/* -DestinationPath "./FIGPrint-$version-win-x64.zip"
          Compress-Archive -Path ./publish/win-arm64/* -DestinationPath "./FIGPrint-$version-win-arm64.zip"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $banner  = Get-Content assets/banners/figprint.txt -Raw -Encoding UTF8
          $notes   = @"
          ``````
          $banner
          ``````

          Cross-platform CLI tool for rendering text as FIGLet ASCII art.

          📦 Install via winget: ``winget install ByteForge.FIGPrint``

          | | |
          |---|---|
          | **Version** | ``$version`` |
          | **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Commit** | ``${{ github.sha }}`` |

          📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/ChangeLog-2026.md)
          "@
          $notes | Set-Content "$env:TEMP\release-notes.md" -Encoding UTF8
          gh release create "figprint-v$version" `
            --target "${{ github.sha }}" `
            --title "FIGPrint v$version" `
            --notes-file "$env:TEMP\release-notes.md" `
            "FIGPrint-$version-win-x64.zip" `
            "FIGPrint-$version-win-arm64.zip"

      - name: Delete previous releases
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $newTag = "figprint-v${{ steps.version.outputs.version }}"
          gh release list --limit 1000 --json tagName --jq '.[].tagName' |
            Where-Object { $_ -like 'figprint-v*' -and $_ -ne $newTag } |
            ForEach-Object { gh release delete $_ --yes --cleanup-tag }

      - name: Submit to winget
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $version    = "${{ steps.version.outputs.version }}"
          $x64Url     = "https://github.com/${{ github.repository }}/releases/download/figprint-v$version/FIGPrint-$version-win-x64.zip"
          $arm64Url   = "https://github.com/${{ github.repository }}/releases/download/figprint-v$version/FIGPrint-$version-win-arm64.zip"
          $token      = "${{ secrets.WINGET_GITHUB_TOKEN }}"
          $packageId  = "ByteForge.FIGPrint"
          $manifestsOut = "./winget-manifests"

          # Detect whether ByteForge.FIGPrint already exists in winget-pkgs
          # to determine whether the PR title says "New package" or "New version".
          $apiUrl  = "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/b/ByteForge/FIGPrint"
          $headers = @{ Authorization = "Bearer $token"; "User-Agent" = "GitHub-Actions" }
          $exists  = $false
          try {
            $null  = Invoke-WebRequest -Uri $apiUrl -Headers $headers -Method Head -ErrorAction Stop
            $exists = $true
          } catch {
            $statusCode = $null
            if ($_.Exception -and $_.Exception.Response -and $_.Exception.Response.StatusCode) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }
            if ($statusCode -eq 404) {
              Write-Host "Package not found in winget-pkgs (HTTP 404). Treating as first-time submission."
              $exists = $false
            } else {
              Write-Error ("Failed to query winget-pkgs GitHub API. HTTP status: {0}" -f ($statusCode ?? "unknown"))
              throw
            }
          }

          # Always build manifests manually to guarantee ManifestVersion 1.12.0.
          # wingetcreate update emits 1.6.0 manifests which are rejected by the pipeline.
          $action = if ($exists) { "update" } else { "new" }
          Write-Host "Package $action — generating manifest for v$version"

          $x64Sha256   = (Get-FileHash "./FIGPrint-$version-win-x64.zip"   -Algorithm SHA256).Hash.ToUpper()
          $arm64Sha256 = (Get-FileHash "./FIGPrint-$version-win-arm64.zip" -Algorithm SHA256).Hash.ToUpper()
          Write-Host "x64   SHA256: $x64Sha256"
          Write-Host "arm64 SHA256: $arm64Sha256"

          $manifestDir = "$manifestsOut/manifests/b/ByteForge/FIGPrint/$version"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null

          # PowerShell here-strings require "@ at column 0, which conflicts with
          # YAML indentation. Use string arrays joined with newlines instead.
          $n = "`n"
          $PackageId = "ByteForge.FIGPrint"

          #
          # ▀██▀                                   ██                      ██    ▄██▄ 
          #  ██  ███▄██▄ ▀█▄▀▀█▄ ▄█▀▀▀█▄ ▀█▄█▀█▄ ▀▀██▀▀   ▀▀▀█▄  ▀█▄▀▀█▄ ▀▀██▀▀  ▀██▀ 
          #  ██  ██ █ ██  ██▄▄█▀ ██   ██  ██       ██ ▄▄ ▄█▀▀██   ██  ██   ██ ▄▄  ▀▀  
          # ▀▀▀▀ ▀▀ ▀ ▀▀ ▄██▄     ▀▀▀▀▀  ▀▀▀▀       ▀▀▀   ▀▀▀ ▀▀  ▀▀  ▀▀    ▀▀▀   ▀▀  
          # 
          # NOTE: 'winget validate' reports these manifests as valid (with warnings),
          # but the winget-pkgs pipeline additionally requires the yaml-language-server
          # schema header comment on each file. Without it the pipeline fails manifest
          # validation even though the YAML content itself is correct.

          #
          # The Version manifest
          #
          @("# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json",
            "",
            "PackageIdentifier: $PackageId",
            "PackageVersion: $version",
            "DefaultLocale: en-US",
            "ManifestType: version",
            "ManifestVersion: 1.12.0",
            "") -join $n |
            Set-Content "$manifestDir/ByteForge.FIGPrint.yaml" -Encoding UTF8 -NoNewline

          #
          # The Default Locale manifest
          #
          @("# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json",
            "",
            "PackageIdentifier: $PackageId",
            "PackageVersion: $version",
            "PackageLocale: en-US",
            "Publisher: ByteForge",
            "PublisherUrl: https://github.com/PaulStSmith",
            "PublisherSupportUrl: https://github.com/${{ github.repository }}/issues",
            "PackageName: FIGPrint",
            "PackageUrl: https://github.com/${{ github.repository }}",
            "License: MIT",
            "LicenseUrl: https://github.com/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/LICENSE",
            "ShortDescription: Command-line utility for rendering text using FIGlet fonts",
            "ManifestType: defaultLocale",
            "ManifestVersion: 1.12.0",
            "") -join $n |
            Set-Content "$manifestDir/ByteForge.FIGPrint.locale.en-US.yaml" -Encoding UTF8 -NoNewline

          #
          # The Installer manifest
          #
          @("# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json",
            "",
            "PackageIdentifier: $PackageId",
            "PackageVersion: $version",
            "Installers:",
            "- Architecture: x64",
            "  InstallerUrl: $x64Url",
            "  InstallerSha256: $x64Sha256",
            "  InstallerType: zip",
            "  NestedInstallerType: portable",
            "  NestedInstallerFiles:",
            "  - RelativeFilePath: FIGPrint.exe",

            "- Architecture: arm64",
            "  InstallerUrl: $arm64Url",
            "  InstallerSha256: $arm64Sha256",
            "  InstallerType: zip",
            "  NestedInstallerType: portable",
            "  NestedInstallerFiles:",
            "  - RelativeFilePath: FIGPrint.exe",
            "ManifestType: installer",
            "ManifestVersion: 1.12.0",
            "") -join $n |
            Set-Content "$manifestDir/ByteForge.FIGPrint.installer.yaml" -Encoding UTF8 -NoNewline

          # Locate the generated YAML files.
          $yamlFiles = Get-ChildItem -Path $manifestsOut -Recurse -Filter "*.yaml"
          if ($yamlFiles.Count -eq 0) {
            Write-Error "No YAML manifest files were found in $manifestsOut"
            exit 1
          }
          Write-Host "Generated $($yamlFiles.Count) manifest file(s):"
          $yamlFiles | ForEach-Object { Write-Host "  $($_.FullName)" }

          # Identify the token owner (the fork will live under their account)
          $ownerLogin = gh api user --jq '.login'
          Write-Host "Submitting PR as: $ownerLogin"

          # Ensure a fork of microsoft/winget-pkgs exists under the token owner
          gh repo fork microsoft/winget-pkgs --clone=false
          Write-Host "Fork ready at $ownerLogin/winget-pkgs"

          # Get the current HEAD SHA of microsoft/winget-pkgs master
          $baseSha = gh api repos/microsoft/winget-pkgs/git/refs/heads/master --jq '.object.sha'

          # Create (or recreate) a branch on the fork
          $branchName = "figprint-v$version"
          $existingRef = gh api "repos/$ownerLogin/winget-pkgs/git/refs/heads/$branchName" 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Branch $branchName already exists — deleting and recreating"
            gh api "repos/$ownerLogin/winget-pkgs/git/refs/heads/$branchName" -X DELETE
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to delete existing branch $branchName"
              exit 1
            }
          }
          gh api "repos/$ownerLogin/winget-pkgs/git/refs" `
            -X POST `
            -f ref="refs/heads/$branchName" `
            -f sha="$baseSha"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to create branch $branchName on fork"
            exit 1
          }
          Write-Host "Created branch $branchName"

          # Upload each YAML file to the correct path in the fork branch.
          # Build the JSON body and pipe via --input to avoid argument-length
          # issues when passing large base64 strings through -f flags.
          $targetBase = "manifests/b/ByteForge/FIGPrint/$version"
          foreach ($file in $yamlFiles) {
            $encoded    = [Convert]::ToBase64String(
                            [System.Text.Encoding]::UTF8.GetBytes(
                              (Get-Content $file.FullName -Raw)))
            $targetPath = "$targetBase/$($file.Name)"
            $body       = [PSCustomObject]@{
                            message = "Add $packageId $version"
                            content = $encoded
                            branch  = $branchName
                          } | ConvertTo-Json -Compress
            Write-Host "Uploading $($file.Name) → $targetPath"
            $body | gh api "repos/$ownerLogin/winget-pkgs/contents/$targetPath" `
              -X PUT --input -
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to upload $($file.Name) to $targetPath"
              exit 1
            }
            Write-Host "  ✓ Uploaded successfully"
          }

          # Open the PR with the required winget title format
          $prTitle = if ($exists) {
            "New version: $packageId version $version"
          } else {
            "New package: $packageId version $version"
          }
          $prBody  = "Automated submission from [$packageId v$version](https://github.com/${{ github.repository }}/releases/tag/figprint-v$version)."

          Write-Host "Opening PR: $prTitle"
          gh pr create `
            --repo  microsoft/winget-pkgs `
            --head  "$ownerLogin`:$branchName" `
            --base  master `
            --title $prTitle `
            --body  $prBody
