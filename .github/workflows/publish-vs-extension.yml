name: Publish Visual Studio Extension

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.VisualStudioExtension/**/*.cs'
      - 'FIGLet/**/*.cs'  # VS Extension depends on FIGLet library
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest

    permissions:
      contents: write   # push version tag
      actions: write    # read/write repo variables for version tracking

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Copy LICENSE
        shell: bash
        run: cp LICENSE FIGLet.VisualStudioExtension/LICENSE

      - name: Setup .NET Framework
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Compute version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read major.minor from the vsixmanifest.
          $manifestPath = Resolve-Path "FIGLet.VisualStudioExtension/source.extension.vsixmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $base = $manifest.PackageManifest.Metadata.Identity.Version -replace '\.\d+$', ''

          # Helper: PATCH an existing variable, fall back to POST on first run.
          # Throws on failure so the step fails fast rather than silently continuing
          # with stale variables.
          function Upsert-ActionsVar([string]$Name, [string]$Value) {
            gh api "repos/${{ github.repository }}/actions/variables/$Name" `
              -X PATCH -f value="$Value" 2>$null
            if ($LASTEXITCODE -ne 0) {
              gh api "repos/${{ github.repository }}/actions/variables" `
                -X POST -f name="$Name" -f value="$Value"
              if ($LASTEXITCODE -ne 0) { throw "Failed to upsert variable '$Name'" }
            }
          }

          # Read stored maj/min and patch variables; default gracefully on first run.
          $storedMajMin = (gh api "repos/${{ github.repository }}/actions/variables/VSEXT_MAJ_MIN" --jq '.value' 2>$null)
          if ($LASTEXITCODE -ne 0) { $storedMajMin = "" }
          $storedPatch = (gh api "repos/${{ github.repository }}/actions/variables/VSEXT_PATCH" --jq '.value' 2>$null)
          if ($LASTEXITCODE -ne 0) { $storedPatch = "0" }

          if ($base -ne $storedMajMin) {
            # Major/minor changed — write PATCH first so a failure between the two
            # writes leaves MAJ_MIN stale and the mismatch is safely re-detected next run.
            $newPatch = 0
            Upsert-ActionsVar "VSEXT_PATCH"   "0"
            Upsert-ActionsVar "VSEXT_MAJ_MIN" "$base"
          } else {
            # Same major/minor — increment patch.
            # Capped at 65534 to stay within the 0-65535 limit of System.Version components.
            $newPatch = [Math]::Min([int]$storedPatch + 1, 65534)
            Upsert-ActionsVar "VSEXT_PATCH" "$newPatch"
          }

          $newVersion = "$base.$newPatch"
          $manifest.PackageManifest.Metadata.Identity.Version = $newVersion
          $manifest.Save($manifestPath)
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "base=$base" >> $env:GITHUB_OUTPUT
          echo "Version: $newVersion"

      - name: Check if tag exists
        id: check_tag
        shell: bash
        run: |
          TAG_NAME="vsext-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Restore NuGet packages
        if: steps.check_tag.outputs.exists == 'false'
        run: nuget restore FIGLetAddIn.sln

      - name: Build FIGLet library
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet build FIGLet/FIGLet.csproj --configuration Release

      - name: Build VSIX
        if: steps.check_tag.outputs.exists == 'false'
        run: msbuild FIGLet.VisualStudioExtension/FIGlet.VisualStudioExtension.csproj /p:Configuration=Release /p:DeployExtension=false

      - name: Find VSIX file
        if: steps.check_tag.outputs.exists == 'false'
        id: find_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "FIGLet.VisualStudioExtension/bin/Release" -Filter "*.vsix" | Select-Object -First 1
          if ($vsix) {
            echo "vsix_path=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
            echo "Found VSIX: $($vsix.FullName)"
          } else {
            Write-Error "No VSIX file found"
            exit 1
          }

      - name: Publish to VS Marketplace
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        env:
          VS_MARKETPLACE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vsixPath = "${{ steps.find_vsix.outputs.vsix_path }}"
          $overviewPath = Join-Path $env:GITHUB_WORKSPACE "FIGLet.VisualStudioExtension\readme.md"

          # Use VsixPublisher from VS installation or download it
          $vsixPublisher = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"

          if (-not (Test-Path $vsixPublisher)) {
            # Try Community edition
            $vsixPublisher = "C:\Program Files\Microsoft Visual Studio\2022\Community\VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          }

          if (-not (Test-Path $vsixPublisher)) {
            # Download and use tfx-cli as alternative
            npm install -g tfx-cli
            tfx extension publish --vsix "$vsixPath" --token $env:VS_MARKETPLACE_PAT --overview-markdown "$overviewPath" --no-prompt
          } else {
            # Build the publish manifest via ConvertTo-Json so backslashes in the
            # path are properly escaped and the output is valid JSON.
            $manifest = @{
              categories = @('Other')
              identity   = @{ internalName = 'FIGLetCommentGenerator' }
              overview   = $overviewPath
              publisher  = 'PaulStSmith'
              assetFiles = @(
                @{ pathOnDisk = "FIGLet.VisualStudioExtension/Resources/preview.png";            targetPath = "preview.png" }
                @{ pathOnDisk = "FIGLet.VisualStudioExtension/Resources/screenshot.png";         targetPath = "Resources/screenshot.png" }
                @{ pathOnDisk = "FIGLet.VisualStudioExtension/Resources/screenshot-settings.png"; targetPath = "Resources/screenshot-settings.png" }
              )
            }
            $manifest | ConvertTo-Json -Depth 10 | Out-File -FilePath "publish-manifest.json" -Encoding UTF8

            & $vsixPublisher publish -payload "$vsixPath" -publishManifest "publish-manifest.json" -personalAccessToken $env:VS_MARKETPLACE_PAT
          }

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '```'
            cat assets/banners/figlet-vs-extension.txt
            echo '```'
            echo ''
            echo 'Visual Studio 2022+ extension for inserting FIGLet ASCII art comments.'
            echo ''
            echo '| 📦 Published to | [Visual Studio Marketplace](https://marketplace.visualstudio.com/items?itemName=PaulStSmith.FIGLetCommentGenerator) |'
            echo '|---|---|'
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Manifest base** | \`${{ steps.version.outputs.base }}\` |"
            echo "| **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ''
            echo "📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/ChangeLog-2026.md)"
          } > "$RUNNER_TEMP/release-notes.md"
          gh release create "vsext-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "VS Extension v${{ steps.version.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "${{ steps.find_vsix.outputs.vsix_path }}"

      - name: Delete previous releases
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="vsext-v${{ steps.version.outputs.version }}"
          gh release list --limit 1000 --json tagName \
            --jq '.[] | .tagName | select(startswith("vsext-v"))' \
            | while read -r tag; do
                [ "$tag" = "$NEW_TAG" ] && continue
                gh release delete "$tag" --yes --cleanup-tag || true
              done
