name: Publish Visual Studio Extension

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.VisualStudioExtension/**'
      - 'FIGLet/**'  # VS Extension depends on FIGLet library
      - '.github/workflows/publish-vs-extension.yml'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest

    permissions:
      contents: write   # push version tag

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup .NET Framework
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          # Read major.minor from the manifest; use the Actions run number as patch.
          # Capped at 65534 to stay within the 0-65535 limit of System.Version components.
          $manifestPath = Resolve-Path "FIGLet.VisualStudioExtension/source.extension.vsixmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $base = $manifest.PackageManifest.Metadata.Identity.Version -replace '\.\d+$', ''
          $patch = [Math]::Min(${{ github.run_number }}, 65534)
          $newVersion = "$base.$patch"
          $manifest.PackageManifest.Metadata.Identity.Version = $newVersion
          $manifest.Save($manifestPath)
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "base=$base" >> $env:GITHUB_OUTPUT
          echo "Version: $newVersion"

      - name: Check if tag exists
        id: check_tag
        shell: bash
        run: |
          TAG_NAME="vsext-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Restore NuGet packages
        if: steps.check_tag.outputs.exists == 'false'
        run: nuget restore FIGLetAddIn.sln

      - name: Build FIGLet library
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet build FIGLet/FIGLet.csproj --configuration Release

      - name: Build VSIX
        if: steps.check_tag.outputs.exists == 'false'
        run: msbuild FIGLet.VisualStudioExtension/FIGlet.VisualStudioExtension.csproj /p:Configuration=Release /p:DeployExtension=false

      - name: Find VSIX file
        if: steps.check_tag.outputs.exists == 'false'
        id: find_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "FIGLet.VisualStudioExtension/bin/Release" -Filter "*.vsix" | Select-Object -First 1
          if ($vsix) {
            echo "vsix_path=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
            echo "Found VSIX: $($vsix.FullName)"
          } else {
            Write-Error "No VSIX file found"
            exit 1
          }

      - name: Publish to VS Marketplace
        if: steps.check_tag.outputs.exists == 'false'
        shell: pwsh
        env:
          VS_MARKETPLACE_PAT: ${{ secrets.VS_MARKETPLACE_PAT }}
        run: |
          $vsixPath = "${{ steps.find_vsix.outputs.vsix_path }}"

          # Use VsixPublisher from VS installation or download it
          $vsixPublisher = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"

          if (-not (Test-Path $vsixPublisher)) {
            # Try Community edition
            $vsixPublisher = "C:\Program Files\Microsoft Visual Studio\2022\Community\VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          }

          if (-not (Test-Path $vsixPublisher)) {
            # Download and use tfx-cli as alternative
            npm install -g tfx-cli
            tfx extension publish --vsix "$vsixPath" --token $env:VS_MARKETPLACE_PAT --no-prompt
          } else {
            # Create publish manifest
            $publishManifest = @"
          {
            "categories": ["Other"],
            "identity": {
              "internalName": "FIGLetCommentGenerator"
            },
            "overview": "Marketplace Overview.md",
            "publisher": "PaulStSmith",
            "assetFiles": [
              { "pathOnDisk": "FIGLet.VisualStudioExtension/bin/Release/Resources/preview.png", "targetPath": "preview.png" }
            ]
          }
          "@
            $publishManifest | Out-File -FilePath "publish-manifest.json" -Encoding UTF8

            & $vsixPublisher publish -payload "$vsixPath" -publishManifest "publish-manifest.json" -personalAccessToken $env:VS_MARKETPLACE_PAT
          }

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "vsext-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "VS Extension v${{ steps.version.outputs.version }}" \
            --notes "## VS Extension v${{ steps.version.outputs.version }}

          Published to the Visual Studio Marketplace.

          | | |
          |---|---|
          | **Published version** | \`${{ steps.version.outputs.version }}\` |
          | **Manifest base** | \`${{ steps.version.outputs.base }}\` |
          | **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Commit** | \`${{ github.sha }}\` |" \
            "${{ steps.find_vsix.outputs.vsix_path }}"
