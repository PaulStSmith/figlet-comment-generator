name: Publish FIGLet to NuGet

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet/**/*.cs'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push version tag
      actions: write    # read/write repo variables for version tracking

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Copy LICENSE
        run: cp LICENSE FIGLet/LICENSE

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read major.minor from csproj.
          BASE=$(grep -oPm1 "(?<=<Version>)[^<]+" FIGLet/FIGLet.csproj | sed 's/\.[0-9]*$//')

          # Read stored maj/min and patch variables; default gracefully on first run.
          STORED_MAJ_MIN=$(gh api "repos/${{ github.repository }}/actions/variables/NUGET_MAJ_MIN" --jq '.value' 2>/dev/null || echo "")
          STORED_PATCH=$(gh api "repos/${{ github.repository }}/actions/variables/NUGET_PATCH" --jq '.value' 2>/dev/null || echo "0")

          if [ "$BASE" != "$STORED_MAJ_MIN" ]; then
            # Major/minor changed — reset patch to 0 and update the stored value.
            NEW_PATCH=0
            gh api "repos/${{ github.repository }}/actions/variables/NUGET_MAJ_MIN" -X PATCH -f value="$BASE" 2>/dev/null || \
              gh api "repos/${{ github.repository }}/actions/variables" -X POST -f name="NUGET_MAJ_MIN" -f value="$BASE"
            gh api "repos/${{ github.repository }}/actions/variables/NUGET_PATCH" -X PATCH -f value="0" 2>/dev/null || \
              gh api "repos/${{ github.repository }}/actions/variables" -X POST -f name="NUGET_PATCH" -f value="0"
          else
            # Same major/minor — increment patch.
            # Capped at 65534 to stay within the 0-65535 limit of System.Version components.
            NEW_PATCH=$(( STORED_PATCH + 1 ))
            NEW_PATCH=$(( NEW_PATCH > 65534 ? 65534 : NEW_PATCH ))
            gh api "repos/${{ github.repository }}/actions/variables/NUGET_PATCH" -X PATCH -f value="$NEW_PATCH" 2>/dev/null || \
              gh api "repos/${{ github.repository }}/actions/variables" -X POST -f name="NUGET_PATCH" -f value="$NEW_PATCH"
          fi

          NEW_VERSION="$BASE.$NEW_PATCH"
          sed -i "s|<Version>[^<]*</Version>|<Version>$NEW_VERSION</Version>|" FIGLet/FIGLet.csproj
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG_NAME="figlet-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Restore dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet restore FIGLet/FIGLet.csproj

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet build FIGLet/FIGLet.csproj --configuration Release --no-restore

      - name: Run tests
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet test FIGLet.Tests/FIGLet.Tests.csproj --configuration Release --verbosity normal

      - name: Pack
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet pack FIGLet/FIGLet.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '```'
            cat assets/banners/figlet-net.txt
            echo '```'
            echo ''
            echo '.NET FIGLet rendering library — multi-targets from .NET Framework 4.7.2 to .NET 10.'
            echo ''
            echo "| 📦 Published to | [NuGet](https://www.nuget.org/packages/FIGLet/) |"
            echo '|---|---|'
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ''
            echo "📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/ChangeLog-2026.md)"
          } > /tmp/release-notes.md
          gh release create "figlet-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "ByteForge.FIGLet v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            ./nupkg/*.nupkg

      - name: Delete previous releases
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="figlet-v${{ steps.version.outputs.version }}"
          gh release list --limit 1000 --json tagName \
            --jq '.[] | .tagName | select(startswith("figlet-v"))' \
            | while read -r tag; do
                [ "$tag" = "$NEW_TAG" ] && continue
                gh release delete "$tag" --yes --cleanup-tag || true
              done
