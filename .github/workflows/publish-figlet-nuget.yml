name: Publish FIGLet to NuGet

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet/**'
      - '.github/workflows/publish-figlet-nuget.yml'

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" FIGLet/FIGLet.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG_NAME="figlet-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Restore dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet restore FIGLet/FIGLet.csproj

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet build FIGLet/FIGLet.csproj --configuration Release --no-restore

      - name: Run tests
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet test FIGLet.Tests/FIGLet.Tests.csproj --configuration Release --verbosity normal

      - name: Pack
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet pack FIGLet/FIGLet.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "figlet-v${{ steps.version.outputs.version }}" -m "FIGLet v${{ steps.version.outputs.version }}"
          git push origin "figlet-v${{ steps.version.outputs.version }}"
