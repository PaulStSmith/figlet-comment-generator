name: Publish VS Code Extension

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.VSCodeExtension/**'
      - '.github/workflows/publish-vscode-extension.yml'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create GitHub releases

    defaults:
      run:
        working-directory: FIGLet.VSCodeExtension

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FIGLet.VSCodeExtension/package-lock.json

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        working-directory: .
        run: |
          TAG_NAME="vscode-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Run linter
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run lint

      - name: Install vsce
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install -g @vscode/vsce

      - name: Package extension
        if: steps.check_tag.outputs.exists == 'false'
        id: package
        run: |
          VSIX_NAME="figlet-${{ steps.version.outputs.version }}.vsix"
          vsce package --out "$VSIX_NAME"
          echo "vsix_name=$VSIX_NAME" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        if: steps.check_tag.outputs.exists == 'false'
        run: vsce publish --packagePath "${{ steps.package.outputs.vsix_name }}" -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "vscode-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "VS Code Extension v${{ steps.version.outputs.version }}" \
            --notes "## VS Code Extension v${{ steps.version.outputs.version }}

          Published to the VS Code Marketplace.

          | | |
          |---|---|
          | **Version** | \`${{ steps.version.outputs.version }}\` |
          | **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Commit** | \`${{ github.sha }}\` |" \
            "FIGLet.VSCodeExtension/${{ steps.package.outputs.vsix_name }}"

