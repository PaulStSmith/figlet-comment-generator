name: Publish VS Code Extension

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.VSCodeExtension/**/*.ts'
      - 'FIGLet.VSCodeExtension/**/*.tsx'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create GitHub releases
      actions: write    # read/write repo variables for version tracking

    defaults:
      run:
        working-directory: FIGLet.VSCodeExtension

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FIGLet.VSCodeExtension/package-lock.json

      - name: Copy LICENSE
        working-directory: .
        run: cp LICENSE FIGLet.VSCodeExtension/LICENSE

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read major.minor from package.json.
          BASE=$(node -p "require('./package.json').version.replace(/\.\d+$/, '')")

          # Helper: PATCH an existing variable, fall back to POST on first run.
          upsert_var() {
            local name="$1" value="$2"
            gh api "repos/${{ github.repository }}/actions/variables/$name" \
              -X PATCH -f value="$value" >/dev/null 2>&1 || \
            gh api "repos/${{ github.repository }}/actions/variables" \
              -X POST -f name="$name" -f value="$value" >/dev/null
          }

          # Read stored maj/min and patch variables; default gracefully on first run.
          STORED_MAJ_MIN=$(gh api "repos/${{ github.repository }}/actions/variables/VSCODE_MAJ_MIN" --jq '.value' 2>/dev/null || echo "")
          STORED_PATCH=$(gh api "repos/${{ github.repository }}/actions/variables/VSCODE_PATCH" --jq '.value' 2>/dev/null || echo "0")

          if [ "$BASE" != "$STORED_MAJ_MIN" ]; then
            # Major/minor changed — write PATCH first so a failure between the two
            # writes leaves MAJ_MIN stale and the mismatch is safely re-detected next run.
            NEW_PATCH=0
            upsert_var "VSCODE_PATCH"   "0"
            upsert_var "VSCODE_MAJ_MIN" "$BASE"
          else
            # Same major/minor — increment patch.
            NEW_PATCH=$(( STORED_PATCH + 1 ))
            upsert_var "VSCODE_PATCH" "$NEW_PATCH"
          fi

          NEW_VERSION="$BASE.$NEW_PATCH"
          # Update package.json and package-lock.json in sync so npm ci
          # (lockfileVersion 3) does not see a root-version mismatch.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            p.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            const l = JSON.parse(fs.readFileSync('./package-lock.json', 'utf8'));
            l.version = '$NEW_VERSION';
            if (l.packages && l.packages['']) l.packages[''].version = '$NEW_VERSION';
            fs.writeFileSync('./package-lock.json', JSON.stringify(l, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

      - name: Check if tag exists
        id: check_tag
        working-directory: .
        run: |
          TAG_NAME="vscode-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Run linter
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run lint

      - name: Install vsce
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install -g @vscode/vsce

      - name: Package extension
        if: steps.check_tag.outputs.exists == 'false'
        id: package
        run: |
          VSIX_NAME="figlet-${{ steps.version.outputs.version }}.vsix"
          # --baseContentUrl rewrites relative image paths in README.md to absolute
          # GitHub raw-content URLs, so marketplace screenshots load reliably without
          # depending on binary assets being inside the VSIX.
          vsce package \
            --baseContentUrl "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/FIGLet.VSCodeExtension" \
            --out "$VSIX_NAME"
          echo "vsix_name=$VSIX_NAME" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        if: steps.check_tag.outputs.exists == 'false'
        run: vsce publish --packagePath "${{ steps.package.outputs.vsix_name }}" -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '```'
            cat assets/banners/figlet-vscode-extension.txt
            echo '```'
            echo ''
            echo 'VS Code extension for inserting FIGLet ASCII art comments.'
            echo ''
            echo '| 📦 Published to | [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=PaulStSmith.figlet-comment-generator) |'
            echo '|---|---|'
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ''
            echo "📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/ChangeLog-2026.md)"
          } > /tmp/release-notes.md
          gh release create "vscode-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "VS Code Extension v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "FIGLet.VSCodeExtension/${{ steps.package.outputs.vsix_name }}"

      - name: Delete previous releases
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="vscode-v${{ steps.version.outputs.version }}"
          gh release list --limit 1000 --json tagName \
            --jq '.[] | .tagName | select(startswith("vscode-v"))' \
            | while read -r tag; do
                [ "$tag" = "$NEW_TAG" ] && continue
                gh release delete "$tag" --yes --cleanup-tag || true
              done

