name: Sync Library Versions

on:
  pull_request:
    branches: [master, main, Development]
    paths:
      - 'FIGLet/FIGLet.csproj'
      - 'FIGLet.TS/package.json'
      - 'FIGLet.Python/pyproject.toml'

jobs:
  sync:
    name: Sync Library Versions
    runs-on: ubuntu-latest
    # Skip fork PRs — we can't push back to a fork's branch
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Read versions
        id: versions
        run: |
          CS_VER=$(grep -om1 '<Version>[^<]*' FIGLet/FIGLet.csproj | sed 's/<Version>//')
          TS_VER=$(node -p "require('./FIGLet.TS/package.json').version")
          PY_VER=$(python3 - <<'EOF'
          import re
          text = open("FIGLet.Python/pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(m.group(1) if m else "0.0.0")
          EOF
          )
          echo "cs=$CS_VER" >> $GITHUB_OUTPUT
          echo "ts=$TS_VER" >> $GITHUB_OUTPUT
          echo "py=$PY_VER" >> $GITHUB_OUTPUT
          echo "C# version:     $CS_VER"
          echo "TS  version:    $TS_VER"
          echo "Python version: $PY_VER"

      - name: Determine target version
        id: target
        run: |
          CS_VER="${{ steps.versions.outputs.cs }}"
          TS_VER="${{ steps.versions.outputs.ts }}"
          PY_VER="${{ steps.versions.outputs.py }}"
          GREATER=$(printf '%s\n' "$CS_VER" "$TS_VER" "$PY_VER" | sort -V | tail -1)
          if [ "$CS_VER" = "$GREATER" ] && [ "$TS_VER" = "$GREATER" ] && [ "$PY_VER" = "$GREATER" ]; then
            echo "in_sync=true" >> $GITHUB_OUTPUT
            echo "All versions already in sync: $GREATER"
          else
            echo "in_sync=false" >> $GITHUB_OUTPUT
            echo "version=$GREATER" >> $GITHUB_OUTPUT
            echo "Versions differ — will sync all to $GREATER"
          fi

      - name: Update C# version
        if: steps.target.outputs.in_sync == 'false' && steps.versions.outputs.cs != steps.target.outputs.version
        run: |
          TARGET="${{ steps.target.outputs.version }}"
          sed -i "s|<Version>[^<]*</Version>|<Version>$TARGET</Version>|" FIGLet/FIGLet.csproj
          echo "Updated FIGLet.csproj to $TARGET"

      - name: Update TS version
        if: steps.target.outputs.in_sync == 'false' && steps.versions.outputs.ts != steps.target.outputs.version
        run: |
          TARGET="${{ steps.target.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('FIGLet.TS/package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('FIGLet.TS/package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$TARGET"
          echo "Updated package.json to $TARGET"

      - name: Update Python version
        if: steps.target.outputs.in_sync == 'false' && steps.versions.outputs.py != steps.target.outputs.version
        run: |
          TARGET="${{ steps.target.outputs.version }}"
          python3 - "$TARGET" <<'EOF'
          import re, sys
          new_ver = sys.argv[1]
          path = "FIGLet.Python/pyproject.toml"
          text = open(path).read()
          text = re.sub(r'^(version\s*=\s*)"[^"]+"', rf'\1"{new_ver}"', text, flags=re.MULTILINE)
          open(path, "w").write(text)
          init_path = "FIGLet.Python/byteforge_figlet/__init__.py"
          init_text = open(init_path).read()
          init_text = re.sub(r'__version__\s*=\s*"[^"]+"', f'__version__ = "{new_ver}"', init_text)
          open(init_path, "w").write(init_text)
          print(f"Updated pyproject.toml and __init__.py to {new_ver}")
          EOF
          echo "Updated Python to $TARGET"

      - name: Commit and push sync
        if: steps.target.outputs.in_sync == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FIGLet/FIGLet.csproj FIGLet.TS/package.json \
                  FIGLet.Python/pyproject.toml FIGLet.Python/byteforge_figlet/__init__.py
          git commit -m "chore: sync library versions to ${{ steps.target.outputs.version }} [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
