name: Publish FIGLet Python

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.Python/**/*.py'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create GitHub releases and push tags
      actions: write    # read/write repo variables for version tracking

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Copy LICENSE
        run: cp LICENSE FIGLet.Python/LICENSE

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: FIGLet.Python
        run: |
          # Read major.minor from pyproject.toml.
          BASE=$(python3 -c "import re; t=open('pyproject.toml').read(); m=re.search(r'version\s*=\s*\"([^\"]+)\"', t); print(m.group(1).rsplit('.', 1)[0])")

          # Read stored maj/min and patch variables; default gracefully on first run.
          STORED_MAJ_MIN=$(gh api "repos/${{ github.repository }}/actions/variables/PY_MAJ_MIN" --jq '.value' 2>/dev/null || echo "")
          STORED_PATCH=$(gh api "repos/${{ github.repository }}/actions/variables/PY_PATCH" --jq '.value' 2>/dev/null || echo "0")

          if [ "$BASE" != "$STORED_MAJ_MIN" ]; then
            # Major/minor changed — reset patch to 0 and update the stored value.
            NEW_PATCH=0
            gh api "repos/${{ github.repository }}/actions/variables/PY_MAJ_MIN" -X PATCH -f value="$BASE" 2>/dev/null || \
              gh api "repos/${{ github.repository }}/actions/variables" -X POST -f name="PY_MAJ_MIN" -f value="$BASE"
            gh api "repos/${{ github.repository }}/actions/variables/PY_PATCH" -X PATCH -f value="0" 2>/dev/null || \
              gh api "repos/${{ github.repository }}/actions/variables" -X POST -f name="PY_PATCH" -f value="0"
          else
            # Same major/minor — increment patch.
            NEW_PATCH=$(( STORED_PATCH + 1 ))
            gh api "repos/${{ github.repository }}/actions/variables/PY_PATCH" -X PATCH -f value="$NEW_PATCH" 2>/dev/null || \
              gh api "repos/${{ github.repository }}/actions/variables" -X POST -f name="PY_PATCH" -f value="$NEW_PATCH"
          fi

          NEW_VERSION="$BASE.$NEW_PATCH"
          sed -i "s/^version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \"[^\"]*\"/__version__ = \"$NEW_VERSION\"/" byteforge_figlet/__init__.py
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG_NAME="figlet-py-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Install build tools
        if: steps.check_tag.outputs.exists == 'false'
        run: pip install hatchling build twine

      - name: Run tests
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: FIGLet.Python
        run: |
          pip install pytest .
          pytest tests/ -v

      - name: Build distribution
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: FIGLet.Python
        run: python -m build

      - name: Check distribution metadata
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: FIGLet.Python
        run: twine check dist/*

      - name: Publish to PyPI
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: FIGLet.Python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --verbose dist/*

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '```'
            cat assets/banners/figlet-python.txt
            echo '```'
            echo ''
            echo 'Python FIGLet rendering library — zero dependencies, spec-compliant.'
            echo ''
            echo "| 📦 Published to | [PyPI](https://pypi.org/project/byteforge-figlet/${{ steps.version.outputs.version }}) |"
            echo '|---|---|'
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ''
            echo "📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/ChangeLog-2026.md)"
          } > /tmp/release-notes.md
          gh release create "figlet-py-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "FIGLet Python v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            FIGLet.Python/dist/*

      - name: Delete previous releases
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="figlet-py-v${{ steps.version.outputs.version }}"
          gh release list --limit 1000 --json tagName \
            --jq '.[] | .tagName | select(startswith("figlet-py-v"))' \
            | while read -r tag; do
                [ "$tag" = "$NEW_TAG" ] && continue
                gh release delete "$tag" --yes --cleanup-tag || true
              done
