name: Publish FIGLet.TS to npm

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.TS/**/*.ts'
      - 'FIGLet.TS/**/*.tsx'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push version tag
      id-token: write   # OIDC token for npm trusted publishing
      actions: write    # read/write repo variables for version tracking

    defaults:
      run:
        working-directory: FIGLet.TS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: FIGLet.TS/package-lock.json

      - name: Copy LICENSE
        working-directory: .
        run: cp LICENSE FIGLet.TS/LICENSE

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read major.minor from package.json.
          BASE=$(node -p "require('./package.json').version.replace(/\.\d+$/, '')")

          # Helper: PATCH an existing variable, fall back to POST on first run.
          upsert_var() {
            local name="$1" value="$2"
            gh api "repos/${{ github.repository }}/actions/variables/$name" \
              -X PATCH -f value="$value" >/dev/null 2>&1 || \
            gh api "repos/${{ github.repository }}/actions/variables" \
              -X POST -f name="$name" -f value="$value" >/dev/null
          }

          # Read stored maj/min and patch variables; default gracefully on first run.
          STORED_MAJ_MIN=$(gh api "repos/${{ github.repository }}/actions/variables/TS_MAJ_MIN" --jq '.value' 2>/dev/null || echo "")
          STORED_PATCH=$(gh api "repos/${{ github.repository }}/actions/variables/TS_PATCH" --jq '.value' 2>/dev/null || echo "0")

          if [ "$BASE" != "$STORED_MAJ_MIN" ]; then
            # Major/minor changed — write PATCH first so a failure between the two
            # writes leaves MAJ_MIN stale and the mismatch is safely re-detected next run.
            NEW_PATCH=0
            upsert_var "TS_PATCH"   "0"
            upsert_var "TS_MAJ_MIN" "$BASE"
          else
            # Same major/minor — increment patch.
            NEW_PATCH=$(( STORED_PATCH + 1 ))
            upsert_var "TS_PATCH" "$NEW_PATCH"
          fi

          NEW_VERSION="$BASE.$NEW_PATCH"
          # Update package.json and package-lock.json in sync before npm ci.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            p.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            const l = JSON.parse(fs.readFileSync('./package-lock.json', 'utf8'));
            l.version = '$NEW_VERSION';
            if (l.packages && l.packages['']) l.packages[''].version = '$NEW_VERSION';
            fs.writeFileSync('./package-lock.json', JSON.stringify(l, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

      - name: Check if tag exists
        id: check_tag
        working-directory: .
        run: |
          TAG_NAME="figlet-ts-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check_tag.outputs.exists == 'false'
        run: npm test

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Pack npm tarball
        if: steps.check_tag.outputs.exists == 'false'
        id: pack
        run: |
          TARBALL=$(npm pack 2>&1 | tail -1)
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '```'
            cat assets/banners/figlet-ts.txt
            echo '```'
            echo ''
            echo 'TypeScript FIGLet rendering library — browser and Node.js compatible.'
            echo ''
            echo "| 📦 Published to | [npm](https://www.npmjs.com/package/@byte-forge/figlet/v/${{ steps.version.outputs.version }}) |"
            echo '|---|---|'
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ''
            echo "📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/ChangeLog-2026.md)"
          } > /tmp/release-notes.md
          gh release create "figlet-ts-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "@byte-forge/figlet v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "FIGLet.TS/${{ steps.pack.outputs.tarball }}"

      - name: Delete previous releases
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="figlet-ts-v${{ steps.version.outputs.version }}"
          gh release list --limit 1000 --json tagName \
            --jq '.[] | .tagName | select(startswith("figlet-ts-v"))' \
            | while read -r tag; do
                [ "$tag" = "$NEW_TAG" ] && continue
                gh release delete "$tag" --yes --cleanup-tag || true
              done
