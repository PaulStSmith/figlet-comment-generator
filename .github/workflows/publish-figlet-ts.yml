name: Publish FIGLet.TS to npm

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.TS/**'
      - '.github/workflows/publish-figlet-ts.yml'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push version tag
      id-token: write   # OIDC token for npm trusted publishing

    defaults:
      run:
        working-directory: FIGLet.TS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: FIGLet.TS/package-lock.json

      - name: Copy LICENSE
        working-directory: .
        run: cp LICENSE FIGLet.TS/LICENSE

      - name: Compute version
        id: version
        run: |
          # Read major.minor from package.json; use the Actions run number as patch.
          BASE=$(node -p "require('./package.json').version.replace(/\.\d+$/, '')")
          NEW_VERSION="$BASE.${{ github.run_number }}"
          # Update package.json and package-lock.json in sync before npm ci.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            p.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
            const l = JSON.parse(fs.readFileSync('./package-lock.json', 'utf8'));
            l.version = '$NEW_VERSION';
            if (l.packages && l.packages['']) l.packages[''].version = '$NEW_VERSION';
            fs.writeFileSync('./package-lock.json', JSON.stringify(l, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

      - name: Check if tag exists
        id: check_tag
        working-directory: .
        run: |
          TAG_NAME="figlet-ts-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check_tag.outputs.exists == 'false'
        run: npm test

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Pack npm tarball
        if: steps.check_tag.outputs.exists == 'false'
        id: pack
        run: |
          TARBALL=$(npm pack 2>&1 | tail -1)
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '```'
            cat assets/banners/figlet-ts.txt
            echo '```'
            echo ''
            echo 'TypeScript FIGLet rendering library — browser and Node.js compatible.'
            echo ''
            echo "📦 Published to [npm](https://www.npmjs.com/package/@byte-forge/figlet/v/${{ steps.version.outputs.version }})"
            echo ''
            echo '| | |'
            echo '|---|---|'
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ''
            echo "📋 [ChangeLog](${{ github.server_url }}/${{ github.repository }}/blob/master/ChangeLog-2026.md)"
          } > /tmp/release-notes.md
          gh release create "figlet-ts-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "@byte-forge/figlet v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "FIGLet.TS/${{ steps.pack.outputs.tarball }}"
