name: Publish FIGLet.TS to npm

on:
  pull_request:
    types: [closed]
    branches: [master, main]
    paths:
      - 'FIGLet.TS/**'
      - '.github/workflows/publish-figlet-ts.yml'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push version tag
      id-token: write   # OIDC token for npm trusted publishing

    defaults:
      run:
        working-directory: FIGLet.TS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: FIGLet.TS/package-lock.json

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        working-directory: .
        run: |
          TAG_NAME="figlet-ts-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will publish"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check_tag.outputs.exists == 'false'
        run: npm test

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Pack npm tarball
        if: steps.check_tag.outputs.exists == 'false'
        id: pack
        run: |
          TARBALL=$(npm pack 2>&1 | tail -1)
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "figlet-ts-v${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "@byte-forge/figlet v${{ steps.version.outputs.version }}" \
            --notes "## @byte-forge/figlet v${{ steps.version.outputs.version }}

          Published to [npm](https://www.npmjs.com/package/@byte-forge/figlet/v/${{ steps.version.outputs.version }}).

          | | |
          |---|---|
          | **Version** | \`${{ steps.version.outputs.version }}\` |
          | **Actions run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Commit** | \`${{ github.sha }}\` |" \
            "FIGLet.TS/${{ steps.pack.outputs.tarball }}"
